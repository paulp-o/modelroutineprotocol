schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform

context: |
  Domain: MRP (Model Routine Protocol) - local CLI for AI agent routine management
  Tech stack: TypeScript, Bun runtime
  Dependencies: yaml (eemeli/yaml v2+), zod (schema validation)
  CLI conventions: Pure YAML-only output; universal envelope {ok, command, ts, data/error}
  Architecture:
    - CLI handlers: src/cli/
    - Business logic: src/core/
    - Zod schemas: src/schema/
    - Utilities: src/util/
  Agent-first design: All outputs are machine-readable; structured errors enable self-repair
  Key patterns: atomic writes (temp+rename), file-based lockfiles, append-only ledger
  Constraints: No network dependencies; fully local

